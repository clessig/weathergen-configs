METEOSAT_SEVIRI_IR_HIRES :
  type : obs
  stream_id : 10
  filenames : ['observations-file-2014-2024-seviri-h512-v5.zarr']
  geoinfo_channels : ['cos_local_time', 'sin_local_time', 'cos_julian_day', 'sin_julian_day', 'zenith', 'cos_sza']
  location_weight : cosine_latitude
  token_size : 1536
  tokenize_spacetime : False
  forcing: True
  embed : 
    net : linear
    num_tokens : 1
    num_heads : 4
    dim_embed : 256
    num_blocks : 2
  embed_target_coords : 
    net : linear
    dim_embed : 256
  target_readout :
    num_layers : 2
    num_heads : 4
  pred_head : 
    ens_size : 1
    num_layers : 1


