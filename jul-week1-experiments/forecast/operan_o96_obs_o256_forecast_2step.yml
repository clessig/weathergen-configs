freeze_modules: ""

streams_directory: "./weathergen-configs/streams/operan_o96_geos_o256_avhrr_iasipc/"

general:
  # mutable parameters
  istep: 0

# config for training
training_config:

  num_mini_epochs: 1
  samples_per_mini_epoch: 8192

  start_date: 2016-01-01T00:00
  end_date: 2022-12-31T00:00
  
  learning_rate_scheduling :
    lr_start: 1e-6
    lr_max: 4e-5
    lr_final_decay: 2e-6
    lr_final: 0.0
    num_steps_warmup: 256
    num_steps_cooldown: 256
    policy_warmup: "cosine"
    policy_decay: "cosine"
    policy_cooldown: "linear"
    parallel_scaling_policy: "sqrt"

