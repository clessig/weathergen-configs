freeze_modules: ".*global.*|.*local.*|.*adapter.*|.*q_cells.*|.*latent.*|.*ERA5.*|.*encoder.*"

general:

  # mutable parameters
  istep: 0

# parameters for data loading
data_loading :

  num_workers: 8
  rng_seed: ???
  repeat_data_in_mini_epoch : False

# config for training
training_config:
  
  num_mini_epochs: 4
  samples_per_mini_epoch: 8192
  
  learning_rate_scheduling :
    lr_start: 1e-6
    lr_max: 3.5e-5
    lr_final_decay: 2e-6
    lr_final: 0.0
    num_steps_warmup: 256
    num_steps_cooldown: 512
    policy_warmup: "cosine"
    policy_decay: "cosine"
    policy_cooldown: "linear"
    parallel_scaling_policy: "sqrt"

  optimizer:
    grad_clip: 0.8

  forecast :
      time_step: 06:00:00
      offset: 1
      num_steps: 8
      policy: "fixed"
