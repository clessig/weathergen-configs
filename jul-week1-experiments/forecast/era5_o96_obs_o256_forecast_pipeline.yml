parallelize: false

stages:
  - name: frcsttrain
    stage: train
    base_config: ./weathergen-configs/jul-week1-experiments/forecast/era5_o96_obs_o256_forecast.yml
    chain_jobs: 6
    nodes: 2

  - name: operfrcst2step
    stage: train
    from_run_id: STAGE.frcsttrain
    config_files:
      - ./weathergen-configs/jul-week1-experiments/forecast/operan_o96_obs_o256_forecast_2step.yml
    chain_jobs: 1
    nodes: 2

  - name: operfrcst8step
    stage: train
    from_run_id: STAGE.operfrcst2step
    config_files:
      - ./weathergen-configs/jul-week1-experiments/forecast/operan_o96_obs_o256_forecast_8step.yml
    chain_jobs: 2
    nodes: 2

  - name: operfrcstinf
    stage: inference
    from_run_id: STAGE.operfrcst8step
    nodes: 2
