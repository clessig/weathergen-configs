parallelize: false

stages:
  - name: multipretrain
    stage: train
    base_config: ./config/space_jepa_and_reconstruction_pretraining_1979_2015.yml
    chain_jobs: 4
    nodes: 2

  - name: mltiprtrnft
    stage: train
    from_run_id: STAGE.multipretrain
    config_files:
      - ./config/space_jepa_and_reconstruction_pretraining_1979_2015.yml
      - ./config/space_jepa_and_reconstruction_pretraining_2016_2022.yml
    chain_jobs: 3
    nodes: 2

  # Stage 3a: Forecasting finetuning (freezes encoder)
  - name: frcstft
    stage: train
    from_run_id: STAGE.mltiprtrnft
    config_files:
      - ./config/space_jepa_frozen_forecast_era5_o96_obs_o256.yml
    chain_jobs: 4
    nodes: 2

  # Stage 3b: Forecasting finetuning (unfreeze encoder)
  # - name: frcstft
  #   stage: train
  #   from_run_id: STAGE.mltiprtrnft
  #   config_files:
  #     - ./config/space_jepa_unfrozen_forecast_era5_o96_obs_o256.yml
  #   chain_jobs: 4
  #   nodes: 2

  # Stage 3: Forecasting finetuning unfrozen
  - name: operfrcstft2
    stage: train
    from_run_id: STAGE.frcstft
    config_files:
      - ./config/operan_o96_obs_o256_forecast_2step.yml
    chain_jobs: 1
    nodes: 2

  # Stage 4: Forecasting finetuning unfrozen
  - name: operfrcstft8
    stage: train
    from_run_id: STAGE.operfrcstft2
    config_files:
      - ./config/operan_o96_obs_o256_forecast_8step.yml
    chain_jobs: 2
    nodes: 2

  - name: operfrcstinf
    stage: inference
    from_run_id: STAGE.operfrcstft8
    nodes: 2

